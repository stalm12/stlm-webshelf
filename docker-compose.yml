services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: webshelf
      POSTGRES_USER: webshelf
      POSTGRES_PASSWORD: webshelf
    ports:
      - "5432:5432"
    volumes:
      - /opt/data/stlm-webshelf/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webshelf"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /opt/data/stlm-webshelf/uploads:/app/uploads
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: webshelf
      DB_USER: webshelf
      DB_PASSWORD: webshelf
      APP_FILE_STORAGE_PATH: /app/uploads
      # Generate a secure encryption key: openssl rand -base64 32
      # Set APP_ENCRYPTION_KEY for persistent encryption across restarts
      APP_ENCRYPTION_KEY: create-secure-random-key-here
    depends_on:
      postgres:
        condition: service_healthy
