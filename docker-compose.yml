services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: webshelf
      POSTGRES_USER: webshelf
      POSTGRES_PASSWORD: webshelf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webshelf"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: webshelf
      DB_USER: webshelf
      DB_PASSWORD: webshelf
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
