spring.application.name=webshelf

# Database -- override with env vars or SPRING_DATASOURCE_URL for Docker
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:webshelf}
spring.datasource.username=${DB_USER:webshelf}
spring.datasource.password=${DB_PASSWORD:webshelf}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Server
server.port=8080

# Vaadin
vaadin.launch-browser=false

# File storage
app.file-storage-path=${APP_FILE_STORAGE_PATH:uploads}

# Encryption for secrets/credentials
# If not set, a random key will be generated (not persistent across restarts)
# To generate a persistent key: java -cp "target/*" -c "import javax.crypto.KeyGenerator; import java.util.Base64; kg = KeyGenerator.getInstance('AES'); kg.init(256); System.out.println(Base64.getEncoder().encodeToString(kg.generateKey().getEncoded()));"
app.encryption-key=${APP_ENCRYPTION_KEY:}
